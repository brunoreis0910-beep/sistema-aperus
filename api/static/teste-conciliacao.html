<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Conciliação</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .resultado { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .sucesso { background: #d4edda; color: #155724; }
        .erro { background: #f8d7da; color: #721c24; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #272822; color: #f8f8f2; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Teste de Conciliação Bancária</h1>
    <p>Este é um teste direto da API sem passar pelo React.</p>
    
    <button onclick="testarConciliacao()">🚀 Testar API</button>
    
    <div id="resultado"></div>

    <script>
        async function testarConciliacao() {
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = '<p>⏳ Testando...</p>';
            
            try {
                // Passo 1: Obter token
                console.log('1️⃣ Fazendo login...');
                const loginResponse = await fetch('http://localhost:8005/api/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin' })
                });
                
                if (!loginResponse.ok) {
                    throw new Error(`Login falhou: ${loginResponse.status}`);
                }
                
                const loginData = await loginResponse.json();
                const token = loginData.access;
                console.log('✅ Token obtido:', token.substring(0, 30) + '...');
                
                // Passo 2: Buscar conciliação
                console.log('2️⃣ Buscando conciliação...');
                const conciliacaoResponse = await fetch('http://localhost:8005/api/financeiro/conciliacao/?mes=3&ano=2026', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!conciliacaoResponse.ok) {
                    throw new Error(`Conciliação falhou: ${conciliacaoResponse.status}`);
                }
                
                const data = await conciliacaoResponse.json();
                console.log('✅ Dados recebidos:', data);
                
                // Mostrar resultado
                resultadoDiv.innerHTML = `
                    <div class="resultado sucesso">
                        <h2>✅ SUCESSO!</h2>
                        <p><strong>Total de lançamentos:</strong> ${data.lancamentos.length}</p>
                        <p><strong>Total de créditos:</strong> R$ ${data.resumo.total_creditos.toFixed(2)}</p>
                        <p><strong>Total de débitos:</strong> R$ ${data.resumo.total_debitos.toFixed(2)}</p>
                        <p><strong>Saldo do período:</strong> R$ ${data.resumo.saldo_periodo.toFixed(2)}</p>
                        <p><strong>Conciliados:</strong> ${data.resumo.conciliados}/${data.resumo.total_lancamentos} (${data.resumo.percentual_conciliado}%)</p>
                    </div>
                    <h3>📋 Primeiros lançamentos:</h3>
                    <pre>${JSON.stringify(data.lancamentos.slice(0, 3), null, 2)}</pre>
                `;
            } catch (error) {
                console.error('❌ Erro:', error);
                resultadoDiv.innerHTML = `
                    <div class="resultado erro">
                        <h2>❌ ERRO</h2>
                        <p>${error.message}</p>
                        <p>Verifique o console do navegador (F12) para mais detalhes.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
