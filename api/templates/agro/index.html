<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Agro - APERUS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-menu { 
            transition: transform 0.2s; 
            cursor: pointer;
            height: 100%;
        }
        .card-menu:hover { transform: translateY(-5px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .icon-large { font-size: 3rem; color: #28a745; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🌱 APERUS - Módulo Agro</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <!-- Safras -->
            <div class="col-md-4">
                <div class="card card-menu p-4 text-center" onclick="window.location.href='{% url 'agro_safras' %}'">
                    <div class="icon-large">🗓️</div>
                    <h4>Gestão de Safras</h4>
                    <p class="text-muted">Cadastre e gerencie períodos de safras (Ex: Soja 24/25).</p>
                </div>
            </div>

            <!-- Contratos Barter -->
            <div class="col-md-4">
                <div class="card card-menu p-4 text-center" onclick="window.location.href='{% url 'agro_contratos' %}'">
                    <div class="icon-large">🤝</div>
                    <h4>Contratos / Barter</h4>
                    <p class="text-muted">Contratos de troca, compra futura e fixação de preço.</p>
                </div>
            </div>

            <!-- Conversão -->
            <div class="col-md-4">
                <div class="card card-menu p-4 text-center" onclick="window.location.href='{% url 'agro_conversoes' %}'">
                    <div class="icon-large">⚖️</div>
                    <h4>Conversão de Unidades</h4>
                    <p class="text-muted">Configure fatores (Saca x Kg) e simule conversões.</p>
                </div>
            </div>

            <!-- API Status -->
            <div class="col-md-12">
                <div class="alert alert-info mt-3" id="apiStatus">
                    Verificando conexão com a API...
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Check API Status
        fetch(API_URL + '/safras/')
            .then(response => {
                if(response.ok) {
                    document.getElementById('apiStatus').className = 'alert alert-success';
                    document.getElementById('apiStatus').innerHTML = '✅ Conexão com Sistema estabelecida com sucesso!';
                } else {
                    document.getElementById('apiStatus').className = 'alert alert-warning';
                    document.getElementById('apiStatus').innerHTML = '⚠️ API respondeu, mas com erro. Verifique autenticação.';
                }
            })
            .catch(err => {
                document.getElementById('apiStatus').className = 'alert alert-danger';
                document.getElementById('apiStatus').innerHTML = '❌ Não foi possível conectar ao servidor. Certifique-se que o backend está rodando.';
            });
    </script>
</body>
</html>
