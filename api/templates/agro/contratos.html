<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos de Barter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'agro_index' %}">⬅️ Voltar ao Menu</a>
            <span class="navbar-text text-white">Contratos Agrícolas / Barter</span>
        </div>
    </nav>

    <div class="container">
        
        <div class="row">
            <!-- Formulario -->
            <div class="col-md-12 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Novo Contrato</h5>
                    </div>
                    <div class="card-body">
                        <form id="contratoForm" class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Número do Contrato</label>
                                <input type="text" class="form-control" id="numero_contrato" required>
                            </div>
                            
                            <div class="col-md-5">
                                <label class="form-label">Produtor Rural (Cliente)</label>
                                <select class="form-select" id="id_cliente" required>
                                    <option value="">Carregando clientes...</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Safra</label>
                                <select class="form-select" id="id_safra" required>
                                    <option value="">Selecione a Safra...</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Produto de Troca (Ex: Soja)</label>
                                <select class="form-select" id="id_produto_destino" required>
                                    <option value="">Selecione o Produto...</option>
                                </select>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Qtd Negociada</label>
                                <input type="number" step="0.001" class="form-control" id="quantidade_negociada" required>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Unidade</label>
                                <select class="form-select" id="unidade_medida">
                                    <option value="sc">Saca (sc)</option>
                                    <option value="ton">Tonelada (ton)</option>
                                    <option value="kg">Quilo (kg)</option>
                                </select>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Preço Travado (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="valor_unitario" required>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Data Entrega</label>
                                <input type="date" class="form-control" id="data_entrega" required>
                            </div>

                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-success px-5">Registar Contrato</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Lista -->
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Contratos Registrados</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Contrato</th>
                                        <th>Produtor</th>
                                        <th>Safra</th>
                                        <th>Negociação</th>
                                        <th>Entrega Prevista</th>
                                        <th>Status</th>
                                        <th>Valor Total</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaContratos">
                                    <!-- JS Load -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = '/api';

        // Load Select Options
        async function loadOptions() {
            // Load Safras
            const resSafra = await fetch(API_URL + '/safras/');
            const safras = await resSafra.json();
            const selSafra = document.getElementById('id_safra');
            selSafra.innerHTML = '<option value="">Selecione a Safra...</option>';
            safras.forEach(s => selSafra.innerHTML += `<option value="${s.id_safra}">${s.descricao}</option>`);

            // Load Clientes (Just top 20 for demo)
            const resCli = await fetch(API_URL + '/clientes/'); 
            // Note: Assuming standard endpoint for clients exists. Adapt if paginated.
            const clientes = await resCli.json(); 
            const dataCli = clientes.results ? clientes.results : clientes; // Handle pagination
            
            const selCli = document.getElementById('id_cliente');
            selCli.innerHTML = '<option value="">Selecione...</option>';
            dataCli.slice(0, 50).forEach(c => selCli.innerHTML += `<option value="${c.id_cliente}">${c.nome_razao_social} (${c.cpf_cnpj})</option>`);

            // Load Produtos
            const resProd = await fetch(API_URL + '/produtos/');
            const prods = await resProd.json();
            const dataProds = prods.results ? prods.results : prods;
            
            const selProd = document.getElementById('id_produto_destino');
            selProd.innerHTML = '<option value="">Selecione...</option>';
            dataProds.slice(0, 50).forEach(p => selProd.innerHTML += `<option value="${p.id_produto}">${p.nome_produto}</option>`);
        }

        async function loadContratos() {
            const res = await fetch(API_URL + '/contratos-agricolas/');
            const data = await res.json();
            const tbody = document.getElementById('tabelaContratos');
            tbody.innerHTML = '';

            data.forEach(c => {
                const total = parseFloat(c.valor_total_contrato).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                const dateEntrega = new Date(c.data_entrega).toLocaleDateString('pt-BR');
                
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${c.numero_contrato}</strong></td>
                        <td>${c.cliente_nome || 'N/A'}</td>
                        <td><span class="badge bg-secondary">${c.safra_nome || '-'}</span></td>
                        <td>
                            ${c.quantidade_negociada} ${c.unidade_medida} de ${c.produto_nome || 'Produto'}
                            <div class="small text-muted">@ R$ ${c.valor_unitario}</div>
                        </td>
                        <td>${dateEntrega}</td>
                        <td><span class="badge bg-primary">${c.status}</span></td>
                        <td class="text-success fw-bold">${total}</td>
                    </tr>
                `;
            });
        }

        document.getElementById('contratoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const qtd = parseFloat(document.getElementById('quantidade_negociada').value);
            const val = parseFloat(document.getElementById('valor_unitario').value);
            const total = qtd * val;

            const payload = {
                numero_contrato: document.getElementById('numero_contrato').value,
                id_cliente: document.getElementById('id_cliente').value,
                id_safra: document.getElementById('id_safra').value,
                id_produto_destino: document.getElementById('id_produto_destino').value,
                quantidade_negociada: qtd,
                unidade_medida: document.getElementById('unidade_medida').value,
                valor_unitario: val,
                valor_total_contrato: total,
                data_emissao: new Date().toISOString().split('T')[0],
                data_entrega: document.getElementById('data_entrega').value,
                status: 'Aberto'
            };

            try {
                const res = await fetch(API_URL + '/contratos-agricolas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    Swal.fire('Sucesso!', 'Contrato registrado.', 'success');
                    loadContratos();
                } else {
                    const err = await res.json();
                    Swal.fire('Erro', JSON.stringify(err), 'error');
                }
            } catch (error) {
                console.error(error);
            }
        });

        // Init
        loadOptions();
        loadContratos();

    </script>
</body>
</html>
