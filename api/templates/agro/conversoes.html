<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversão de Unidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'agro_index' %}">⬅️ Voltar ao Menu</a>
            <span class="navbar-text text-white">Configuração de Conversões</span>
        </div>
    </nav>

    <div class="container">
        
        <div class="row align-items-start">
            
            <!-- Calculadora -->
            <div class="col-md-5">
                <div class="card shadow border-success mb-3">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">🧮 Teste Rápido</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>Quantidade</label>
                            <input type="number" id="calcQtd" class="form-control" value="1">
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label>De</label>
                                <input type="text" id="calcDe" class="form-control" placeholder="ex: sc">
                            </div>
                            <div class="col-6">
                                <label>Para</label>
                                <input type="text" id="calcPara" class="form-control" placeholder="ex: kg">
                            </div>
                        </div>
                        <button class="btn btn-outline-success w-100" onclick="simularConversao()">Calcular</button>
                        
                        <div class="mt-3 p-3 bg-light rounded text-center">
                            <h3 id="calcResult" class="text-success fw-bold">0.00</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cadastro de Regras -->
            <div class="col-md-7">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Nova Regra de Conversão</h5>
                    </div>
                    <div class="card-body">
                        <form id="regraForm" class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Produto (Opcional - Vazio = Global)</label>
                                <select id="id_produto" class="form-select">
                                    <option value="">Regra Global (Todos os produtos)</option>
                                    <!-- Populated via JS -->
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>Unidade Origem</label>
                                <input type="text" id="unidade_origem" class="form-control" placeholder="ex: sc" required>
                            </div>
                            <div class="col-md-4">
                                <label>Unidade Destino</label>
                                <input type="text" id="unidade_destino" class="form-control" placeholder="ex: kg" required>
                            </div>
                            <div class="col-md-4">
                                <label>Ação</label>
                                <select id="operacao" class="form-select">
                                    <option value="M">Multiplicar por</option>
                                    <option value="D">Dividir por</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label>Fator de Conversão</label>
                                <input type="number" step="0.0001" id="fator_conversao" class="form-control" placeholder="Ex: 60" required>
                                <small class="text-muted">Ex: 1 sc -> 60 kg = Multiplicar por 60</small>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary">Salvar Regra</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Lista Regras -->
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Regras Ativas</h5>
                    </div>
                    <ul class="list-group list-group-flush" id="listaRegras">
                        <li class="list-group-item">Carregando...</li>
                    </ul>
                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = '/api';
        let regrasCache = [];

        async function loadData() {
            // Produtos
            const resProd = await fetch(API_URL + '/produtos/');
            const prods = await resProd.json();
            const dataProds = prods.results ? prods.results : prods;
            const sel = document.getElementById('id_produto');
            dataProds.forEach(p => sel.innerHTML += `<option value="${p.id_produto}">${p.nome_produto}</option>`);

            // Regras
            loadRegras();
        }

        async function loadRegras() {
            const res = await fetch(API_URL + '/conversoes-unidades/');
            regrasCache = await res.json();
            const list = document.getElementById('listaRegras');
            list.innerHTML = '';

            regrasCache.forEach(r => {
                const op = r.operacao === 'M' ? 'Multiplicar' : 'Dividir';
                const scope = r.produto_nome ? `<span class="badge bg-info">${r.produto_nome}</span>` : '<span class="badge bg-secondary">Global</span>';
                
                list.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            ${scope} 
                            <strong>${r.unidade_origem}</strong> para <strong>${r.unidade_destino}</strong>: 
                            ${op} por ${r.fator_conversao}
                        </div>
                        <button class="btn btn-sm btn-outline-danger" onclick="deletar(${r.id_conversao})">🗑️</button>
                    </li>
                `;
            });
        }

        document.getElementById('regraForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const produtoId = document.getElementById('id_produto').value;

            const payload = {
                id_produto: produtoId ? parseInt(produtoId) : null,
                unidade_origem: document.getElementById('unidade_origem').value,
                unidade_destino: document.getElementById('unidade_destino').value,
                operacao: document.getElementById('operacao').value,
                fator_conversao: parseFloat(document.getElementById('fator_conversao').value)
            };

            const res = await fetch(API_URL + '/conversoes-unidades/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                loadRegras();
                document.getElementById('regraForm').reset();
                Swal.fire('Salvo', 'Regra adicionada', 'success');
            }
        });

        async function deletar(id) {
            await fetch(`${API_URL}/conversoes-unidades/${id}/`, { method: 'DELETE' });
            loadRegras();
        }

        // Simulação Lógica (Local, sem bater na API para ser instantâneo)
        function simularConversao() {
            const qtd = parseFloat(document.getElementById('calcQtd').value);
            const de = document.getElementById('calcDe').value.toLowerCase();
            const para = document.getElementById('calcPara').value.toLowerCase();

            if(!de || !para) return;

            // Busca regra
            const regra = regrasCache.find(r => 
                r.unidade_origem.toLowerCase() === de && 
                r.unidade_destino.toLowerCase() === para
            );

            let res = 0;
            if(regra) {
                if(regra.operacao === 'M') res = qtd * parseFloat(regra.fator_conversao);
                else res = qtd / parseFloat(regra.fator_conversao);
            } else {
                // Tenta inversa
                const regraInv = regrasCache.find(r => 
                    r.unidade_origem.toLowerCase() === para && 
                    r.unidade_destino.toLowerCase() === de
                );
                if(regraInv) {
                    if(regraInv.operacao === 'M') res = qtd / parseFloat(regraInv.fator_conversao);
                    else res = qtd * parseFloat(regraInv.fator_conversao);
                } else {
                    document.getElementById('calcResult').innerText = "Regra não encontrada";
                    return;
                }
            }
            document.getElementById('calcResult').innerText = `${res.toFixed(3)} ${para}`;
        }

        loadData();
    </script>
</body>
</html>
