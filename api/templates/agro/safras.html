<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Safras - DEBUG MODE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'agro_index' %}">⬅️ Voltar ao Menu</a>
            <span class="navbar-text text-white">Gestão de Safras</span>
        </div>
    </nav>

    <div class="container">
        
        <!-- Formulario -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0">Cadastrar Nova Safra</h5>
            </div>
            <div class="card-body">
                <form id="safraForm" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Descrição (Ex: Soja 2024/25)</label>
                        <input type="text" class="form-control" id="descricao" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Data Início</label>
                        <input type="date" class="form-control" id="data_inicio" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Data Fim</label>
                        <input type="date" class="form-control" id="data_fim" required>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success">Salvar Safra</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Lista -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Safras Cadastradas</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Início</th>
                            <th>Fim</th>
                            <th>Ativa</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaSafras">
                        <!-- JS carrega aqui -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = '/api';

        async function loadSafras() {
            try {
                console.log("Carregando safras de:", API_URL + '/safras/');
                const response = await fetch(API_URL + '/safras/');
                console.log("Status:", response.status);
                
                if (!response.ok) {
                    const text = await response.text();
                    console.error("Erro API:", text);
                    Swal.fire('Erro API', `Status: ${response.status} - ${text}`, 'error');
                    return;
                }

                let data = await response.json();
                console.log("Dados recebidos:", data);
                
                // Suporte para paginação DRF (caso ativado globalmente)
                if (data.results) {
                    data = data.results;
                }

                if (!Array.isArray(data)) {
                    console.error("Formato inesperado (não é array):", data);
                    Swal.fire('Erro', 'Formato de resposta inválido', 'error');
                    return;
                }

                const tbody = document.getElementById('listaSafras');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhuma safra cadastrada ou encontrada.</td></tr>';
                    // Não retorna aqui, deixa o resto fluir ou limpa o body
                    return;
                }

                data.forEach(safra => {
                    // Garantir datas válidas
                    let start = safra.data_inicio;
                    let end = safra.data_fim;
                    try {
                        start = new Date(safra.data_inicio + 'T00:00:00').toLocaleDateString('pt-BR');
                        end = new Date(safra.data_fim + 'T00:00:00').toLocaleDateString('pt-BR');
                    } catch (e) { console.error(e); }

                    // Corrigido para .ativo (backend)
                    const active = safra.ativo ? '<span class="badge bg-success">Sim</span>' : '<span class="badge bg-secondary">Não</span>';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${safra.descricao}</td>
                            <td>${start}</td>
                            <td>${end}</td>
                            <td>${active}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteSafra(${safra.id_safra || safra.id})">Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("EXCEÇÃO no loadSafras:", error);
                
                // Melhorando mensagem de erro de rede
                let msg = 'Não foi possível carregar as safras.';
                if (error.message && error.message.includes('Failed to fetch')) {
                    msg += ' Erro de conexão (CORS ou URL errada).';
                }
                
                Swal.fire('Erro', msg, 'error');
            }
        }

        document.getElementById('safraForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                descricao: document.getElementById('descricao').value,
                data_inicio: document.getElementById('data_inicio').value,
                data_fim: document.getElementById('data_fim').value,
                ativo: true // Corrigido de ativa -> ativo
            };
            
            console.log("Enviando POST para safras:", payload);

            try {
                const response = await fetch(API_URL + '/safras/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                         // Adicionar CSRF se necessário
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    Swal.fire('Sucesso!', 'Safra cadastrada.', 'success');
                    loadSafras();
                    document.getElementById('safraForm').reset();
                } else {
                    const errorText = await response.text();
                    console.error("Erro POST:", errorText);
                    Swal.fire('Erro', `Falha ao salvar: ${errorText}`, 'error');
                }
            } catch (error) {
                console.error("Exceção POST:", error);
                Swal.fire('Erro', 'Exceção ao salvar.', 'error');
            }
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function deleteSafra(id) {
            if(!id) return;
            if(confirm('Tem certeza que deseja excluir esta safra?')) {
                try {
                    const res = await fetch(`${API_URL}/safras/${id}/`, { method: 'DELETE' });
                    if(res.ok) {
                        loadSafras();
                        Swal.fire('Deletado', 'Safra removida com sucesso.', 'success');
                    } else {
                        Swal.fire('Erro', 'Não foi possível excluir.', 'error');
                    }
                } catch (e) {
                    console.error(e);
                    Swal.fire('Erro', 'Erro de conexão.', 'error');
                }
            }
        }

        loadSafras();
    </script>
</body>
</html>
